
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-live
  labels:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live
    {{- include "plane.resourceLabels" $ | nindent 4 }}
  {{- with (include "plane.resourceAnnotations" $) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  {{- if not .Values.services.live.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
  - name: live-3000
    port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-live-wl
  {{- include "plane.labelsAndAnnotations" (dict "context" $ "values" .Values.services.live) }}
spec:
  replicas: {{ .Values.services.live.replicas | default 1}}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live
        {{- include "plane.podLabels" (dict "context" $ "values" .Values.services.live) | nindent 8 }}
      annotations:
        timestamp: {{ now | quote }}
        {{- with (include "plane.podAnnotations" (dict "context" $ "values" .Values.services.live)) }}
        {{- . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "plane.podScheduling" .Values.services.live }}
      {{- include "plane.podSecurityContext" . }}
      {{- with (include "plane.s3CANodeVolumes" .) }}
{{ . | indent 6 }}
      {{- end }}
      {{- if include "plane.s3CAEnabled" . }}
      initContainers:
      - name: prepare-ca-bundle
        image: busybox
        {{- include "plane.containerSecurityContext" . }}
        command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Preparing custom CA bundle for Node.js..."
            if [ "$(ls -A /s3-custom-ca)" ]; then
              cat /s3-custom-ca/* > /ca-bundle/custom-ca-bundle.crt
              echo "CA bundle created at /ca-bundle/custom-ca-bundle.crt"
            else
              echo "No custom CA certificates found, creating empty bundle"
              touch /ca-bundle/custom-ca-bundle.crt
            fi
        volumeMounts:
          - name: s3-custom-ca
            mountPath: /s3-custom-ca
            readOnly: true
          - name: ca-bundle
            mountPath: /ca-bundle
      {{- end }}
      containers:
      - name: {{ .Release.Name }}-live
        {{- include "plane.containerSecurityContext" . }}
        imagePullPolicy: {{ .Values.services.live.pullPolicy | default "Always" }}
        image: {{ .Values.services.live.image | default "makeplane/live-commercial" }}:{{ .Values.planeVersion }}
        stdin: true
        tty: true
        resources:
          requests:
            memory: {{ .Values.services.live.memoryRequest | default "50Mi" | quote }}
            cpu: {{ .Values.services.live.cpuRequest | default "50m" | quote }}
          limits:
            memory: {{ .Values.services.live.memoryLimit  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.live.cpuLimit | default "500m" | quote}}
        {{- with (include "plane.s3CANodeBundleMount" .) }}
{{ . | indent 8 }}
        {{- end }}
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-live-vars
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.live_env_existingSecret) }}{{ .Values.external_secrets.live_env_existingSecret }}{{ else }}{{ .Release.Name }}-live-secrets{{ end }}
              optional: false
        {{- if or .Values.extraEnv (include "plane.s3CAEnabled" .) }}
        env:
          {{- with (include "plane.s3CANodeEnvVars" .) }}
{{ . | indent 10 }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
---
