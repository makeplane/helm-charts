
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-live
  {{- if and .Values.monitoring .Values.monitoring.enabled }}
  annotations:
    {{- include "plane.prometheusAnnotations" (dict "port" "3000" "root" .) | nindent 4 }}
  {{- end }}
  labels:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live
    app.kubernetes.io/name: plane-live
    app.kubernetes.io/component: live
    app.kubernetes.io/part-of: plane-enterprise
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  {{- if not .Values.services.live.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
  - name: live-3000
    port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-live-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.live }}
spec:
  replicas: {{ .Values.services.live.replicas | default 1}}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-live
        app.kubernetes.io/name: plane-live
        app.kubernetes.io/component: live
        app.kubernetes.io/part-of: plane-enterprise
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Values.planeVersion }}
      annotations:
        timestamp: {{ now | quote }}
    spec:
      containers:
      - name: {{ .Release.Name }}-live
        imagePullPolicy: {{ .Values.services.live.pullPolicy | default "Always" }}
        image: {{ .Values.services.live.image | default "artifacts.plane.so/makeplane/live-commercial" }}:{{ .Values.planeVersion }}
        stdin: true
        tty: true
        resources:
          requests:
            memory: {{ .Values.services.live.memoryRequest | default "50Mi" | quote }}
            cpu: {{ .Values.services.live.cpuRequest | default "50m" | quote }}
          limits:
            memory: {{ .Values.services.live.memoryLimit  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.live.cpuLimit | default "500m" | quote}}
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-live-vars
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.live_env_existingSecret) }}{{ .Values.external_secrets.live_env_existingSecret }}{{ else }}{{ .Release.Name }}-live-secrets{{ end }}
              optional: false
        {{- if .Values.extraEnv }}
        env:
          {{- toYaml .Values.extraEnv | nindent 10 }}
        {{- end }}
      {{- include "plane.podScheduling" .Values.services.live }}
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
---
