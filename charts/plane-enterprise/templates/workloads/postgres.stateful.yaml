{{- if .Values.services.postgres.local_setup }}

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-pgdb
  {{- if and .Values.monitoring .Values.monitoring.enabled }}
  annotations:
    {{- include "plane.prometheusAnnotations" (dict "port" (.Values.services.postgres.servicePort | toString) "root" .) | nindent 4 }}
  {{- end }}
  labels:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pgdb
    app.kubernetes.io/name: plane-postgres
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: plane-enterprise
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  {{- if not .Values.services.postgres.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
  - name: pg-{{ .Values.services.postgres.servicePort }}
    port: {{ .Values.services.postgres.servicePort }}
    protocol: TCP
    targetPort: 5432
  selector:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pgdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-pgdb-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.postgres }}
spec:
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pgdb
  serviceName:  {{ .Release.Name }}-pgdb
  template:
    metadata:
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pgdb
        app.kubernetes.io/name: plane-postgres
        app.kubernetes.io/component: postgres
        app.kubernetes.io/part-of: plane-enterprise
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Values.planeVersion }}
    spec:
      containers:
      - image: {{ .Values.services.postgres.image }}
        imagePullPolicy: {{ .Values.services.postgres.pullPolicy | default "IfNotPresent" }}
        name: {{ .Release.Name }}-pgdb
        stdin: true
        tty: true
        envFrom:
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.pgdb_existingSecret) }}{{ .Values.external_secrets.pgdb_existingSecret }}{{ else }}{{ .Release.Name }}-pgdb-secrets{{ end }}
              optional: false
        env:
          - name: PGDATA
            value: /var/lib/postgresql/data/plane
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: pvc-{{ .Release.Name }}-pgdb-vol
          subPath: ''
      {{- include "plane.podScheduling" .Values.services.postgres }}
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      creationTimestamp: null
      namespace: {{ .Release.Namespace }}
      name: pvc-{{ .Release.Name }}-pgdb-vol
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: {{ .Values.services.postgres.volumeSize | default "5Gi" | quote }}
      storageClassName: {{ .Values.env.storageClass | quote }}
      volumeMode: Filesystem
      
{{- end }}