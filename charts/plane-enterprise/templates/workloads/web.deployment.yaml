
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-web
  {{- if and .Values.monitoring .Values.monitoring.enabled }}
  annotations:
    {{- include "plane.prometheusAnnotations" (dict "port" "3000" "root" .) | nindent 4 }}
  {{- end }}
  labels:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-web
    app.kubernetes.io/name: plane-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: plane-enterprise
    app.kubernetes.io/managed-by: helm
spec:
  type: ClusterIP
  {{- if not .Values.services.web.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
  - name: web-3000
    port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-web

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-web-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.web }}
spec:
  replicas: {{ .Values.services.web.replicas | default 1 }}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-web
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-web
        app.kubernetes.io/name: plane-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: plane-enterprise
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Values.planeVersion }}
      annotations:
        timestamp: {{ now | quote }}
    spec:
      containers:
      - name: {{ .Release.Name }}-web
        imagePullPolicy: {{ .Values.services.web.pullPolicy | default "Always" }}
        image: {{ .Values.services.web.image | default "artifacts.plane.so/makeplane/web-commercial" }}:{{ .Values.planeVersion }}
        stdin: true
        tty: true
        resources:
          requests:
            memory: {{ .Values.services.web.memoryRequest | default "50Mi" | quote }}
            cpu: {{ .Values.services.web.cpuRequest | default "50m" | quote }}
          limits:
            memory: {{ .Values.services.web.memoryLimit  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.web.cpuLimit | default "500m" | quote}}
        {{- if .Values.extraEnv }}
        env:
          {{- toYaml .Values.extraEnv | nindent 10 }}
        {{- end }}
      {{- include "plane.podScheduling" .Values.services.web }}
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
---