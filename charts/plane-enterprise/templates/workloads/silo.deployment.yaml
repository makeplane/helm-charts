{{- if .Values.services.silo.enabled }}

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-silo
  labels:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-silo
spec:
  type: ClusterIP
  {{- if not .Values.services.silo.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
  - name: silo-3000
    port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-silo

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-silo-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.silo }}
spec:
  replicas: {{ .Values.services.silo.replicas | default 1}}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-silo
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-silo
      annotations:
        timestamp: {{ now | quote }}
    spec:
      {{- include "plane.podScheduling" .Values.services.silo }}
      {{- with (include "plane.s3CANodeVolumes" .) }}
{{ . | indent 6 }}
      {{- end }}
      initContainers:
      - name: wait-for-rabbitmq
        image: busybox
        command:
          - /bin/sh
        args:
          - '-c'
          - >-
            if echo "$AMQP_URL" | grep -q "rabbitmq.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}"; then 
              echo "Waiting for local RabbitMQ..."; 
              until nslookup {{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }} > /dev/null 2>&1; do
                echo "RabbitMQ not ready..."; 
                sleep 5; 
              done; 
              echo "RabbitMQ is up!"; 
            else 
              echo "Skipping wait, using external RabbitMQ"; 
            fi;
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-silo-vars
              optional: false
      {{- if include "plane.s3CAEnabled" . }}
      - name: prepare-ca-bundle
        image: busybox
        command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Preparing custom CA bundle for Node.js..."
            if [ "$(ls -A /s3-custom-ca)" ]; then
              cat /s3-custom-ca/* > /ca-bundle/custom-ca-bundle.crt
              echo "CA bundle created at /ca-bundle/custom-ca-bundle.crt"
            else
              echo "No custom CA certificates found, creating empty bundle"
              touch /ca-bundle/custom-ca-bundle.crt
            fi
        volumeMounts:
          - name: s3-custom-ca
            mountPath: /s3-custom-ca
            readOnly: true
          - name: ca-bundle
            mountPath: /ca-bundle
      {{- end }}
      containers:
      - name: {{ .Release.Name }}-silo
        imagePullPolicy: Always
        image: {{ .Values.services.silo.image | default "artifacts.plane.so/makeplane/silo-commercial" }}:{{ .Values.planeVersion }}
        stdin: true
        tty: true
        resources:
          requests:
            memory: {{ .Values.services.silo.memoryRequest | default "50Mi" | quote }}
            cpu: {{ .Values.services.silo.cpuRequest | default "50m" | quote }}
          limits:
            memory: {{ .Values.services.silo.memoryLimit  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.silo.cpuLimit | default "500m" | quote}}
        {{- with (include "plane.s3CANodeBundleMount" .) }}
{{ . | indent 8 }}
        {{- end }}
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-silo-vars
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.silo_env_existingSecret) }}{{ .Values.external_secrets.silo_env_existingSecret }}{{ else }}{{ .Release.Name }}-silo-secrets{{ end }}
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.doc_store_existingSecret) }}{{ .Values.external_secrets.doc_store_existingSecret }}{{ else }}{{ .Release.Name }}-doc-store-secrets{{ end }}
              optional: false
        {{- if or .Values.extraEnv (include "plane.s3CAEnabled" .) }}
        env:
          {{- with (include "plane.s3CANodeEnvVars" .) }}
{{ . | indent 10 }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
---
{{- end }}