{{- if .Values.services.outbox_poller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-outbox-poller-wl
  {{- include "plane.labelsAndAnnotations" .Values.services.outbox_poller }}
spec:
  replicas: {{ .Values.services.outbox_poller.replicas | default 1}}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-outbox-poller
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-outbox-poller
      annotations:
        timestamp: {{ now | quote }}
    spec:
      {{- include "plane.podScheduling" .Values.services.outbox_poller }}
      {{- include "plane.podSecurityContext" . }}
      containers:
      - name: {{ .Release.Name }}-outbox-poller
        {{- include "plane.containerSecurityContext" . }}
        imagePullPolicy: Always
        image: {{ .Values.services.api.image | default "makeplane/backend-commercial" }}:{{ .Values.planeVersion }}
        stdin: true
        tty: true
        resources:
          requests:
            memory: {{ .Values.services.outbox_poller.memoryRequest  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.outbox_poller.cpuRequest | default "500m" | quote}}
          limits:
            memory: {{ .Values.services.outbox_poller.memoryLimit  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.outbox_poller.cpuLimit | default "500m" | quote}}
        command:
          - ./bin/docker-entrypoint-outbox-poller.sh
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-outbox-poller-vars
              optional: false
          - configMapRef:
              name: {{ .Release.Name }}-app-vars
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.app_env_existingSecret) }}{{ .Values.external_secrets.app_env_existingSecret }}{{ else }}{{ .Release.Name }}-app-secrets{{ end }}
              optional: false
          {{- include "plane.otel.envFrom" $ | nindent 10 }}
        {{- if or .Values.extraEnv (eq (include "plane.otel.enabled" .) "true") }}
        env:
          {{- include "plane.otel.serviceEnv" (dict "ctx" $ "service" "outbox-poller") | nindent 10 }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}

      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account
{{- end }}