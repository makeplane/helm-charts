{{- if .Values.services.pi.enabled }}

apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-pi-api
  labels:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pi-api
    {{- include "plane.commonLabels" $ | nindent 4 }}
spec:
  type: ClusterIP
  {{- if not .Values.services.pi.assign_cluster_ip }}
  clusterIP: None
  {{- end }}
  ports:
  - name: pi-api-8000
    port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pi-api

---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-pi-api-wl
  {{- include "plane.labelsAndAnnotations" (dict "context" $ "values" .Values.services.pi) }}
spec:
  replicas: {{ .Values.services.pi.replicas | default 1 }}
  selector:
    matchLabels:
      app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pi-api
  template:
    metadata:
      namespace: {{ .Release.Namespace }}
      labels:
        app.name: {{ .Release.Namespace }}-{{ .Release.Name }}-pi-api
        {{- include "plane.commonLabels" $ | nindent 8 }}
      annotations:
        timestamp: {{ now | quote }}
    spec:
      {{- include "plane.podScheduling" .Values.services.pi }}
      {{- include "plane.podSecurityContext" . }}
      {{- with (include "plane.s3CAVolumes" .) }}
{{ . | indent 6 }}
      {{- end }}
      containers:
      - name: {{ .Release.Name }}-pi-api
        {{- include "plane.containerSecurityContext" . }}
        imagePullPolicy: {{ .Values.services.pi.pullPolicy | default "Always" }}
        image: {{ .Values.services.pi.image | default "makeplane/plane-pi-commercial" }}:{{ .Values.planeVersion }}
        stdin: true
        tty: true
        resources:
          requests:
            memory: {{ .Values.services.pi.memoryRequest | default "1000Mi" | quote }}
            cpu: {{ .Values.services.pi.cpuRequest | default "500m" | quote }}
          limits:
            memory: {{ .Values.services.pi.memoryLimit  | default "1000Mi" | quote }}
            cpu: {{ .Values.services.pi.cpuLimit | default "500m" | quote}}
        {{- with (include "plane.s3CAVolumeMounts" .) }}
{{ . | indent 8 }}
        {{- end }}
        command:
          - /bin/bash
          - -c
          - |
            set -e
            {{- with (include "plane.s3CAInitScript" .) }}
{{ . | indent 12 }}
            {{- end }}

            exec ./bin/entrypoint-api.sh
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-pi-api-vars
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.pi_api_env_existingSecret) }}{{ .Values.external_secrets.pi_api_env_existingSecret }}{{ else }}{{ .Release.Name }}-pi-api-secrets{{ end }}
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.doc_store_existingSecret) }}{{ .Values.external_secrets.doc_store_existingSecret }}{{ else }}{{ .Release.Name }}-doc-store-secrets{{ end }}
              optional: false
          - secretRef:
              name: {{ if not (empty .Values.external_secrets.opensearch_existingSecret) }}{{ .Values.external_secrets.opensearch_existingSecret }}{{ else }}{{ .Release.Name }}-opensearch-secrets{{ end }}
              optional: false
        {{- if or .Values.extraEnv (include "plane.s3CAEnabled" .) .Values.observability.otel.enabled }}
        env:
          {{- with (include "plane.s3CAEnvVars" .) }}
{{ . | indent 10 }}
          {{- end }}
          {{- with (include "plane.otelServiceEnv" (dict "context" $ "service" "pi-api")) }}
{{ . | indent 10 }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 10 }}
          {{- end }}
        {{- end }}
        readinessProbe:
          failureThreshold: 30
          httpGet:
            path: /pi/
            port: 8000
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
      serviceAccount: {{ .Release.Name }}-srv-account
      serviceAccountName: {{ .Release.Name }}-srv-account

---
{{- end }}
