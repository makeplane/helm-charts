{{- if and .Values.services.postgres.read_replica.enabled (not .Values.services.postgres.read_replica.remote_url) (empty .Values.external_secrets.app_env_existingSecret) }}
{{- fail "read_replica.enabled is true but read_replica.remote_url is empty" }}
{{- end }}
{{- if empty .Values.external_secrets.app_env_existingSecret}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-app-secrets
  labels:
    {{- include "plane.commonLabels" $ | nindent 4 }}
stringData:
  SECRET_KEY: {{ .Values.env.secret_key | default "60gp0byfz2dvffa45cxl20p1scy9xbpf6d8c5y0geejgkyp1b5" | quote }}
  AES_SECRET_KEY: {{ .Values.env.silo_envs.aes_secret_key | default "dsOdt7YrvxsTIFJ37pOaEVvLxN8KGBCr" | quote }}
  LIVE_SERVER_SECRET_KEY: {{ .Values.env.live_server_secret_key | default "htbqvBJAgpm9bzvf3r4urJer0ENReatceh" | quote }}
  PI_INTERNAL_SECRET: {{ .Values.env.pi_envs.internal_secret | default "tyfvfqvBJAgpm9bzvf3r4urJer0Ehfdubk" | quote }}

  {{- if .Values.services.redis.local_setup }}
  REDIS_URL: "redis://{{ .Release.Name }}-redis.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}:6379/"
  {{- else }}
  REDIS_URL: {{ .Values.env.remote_redis_url | default "" | quote }}
  {{- end }}

  {{ if .Values.services.postgres.local_setup }}
  DATABASE_URL: "postgresql://{{ .Values.env.pgdb_username }}:{{ .Values.env.pgdb_password }}@{{ .Release.Name }}-pgdb.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}/{{ .Values.env.pgdb_name }}"
  {{ else if .Values.env.pgdb_remote_url }}
  DATABASE_URL: {{ .Values.env.pgdb_remote_url}}
  {{ else }}
  DATABASE_URL: ""
  {{ end }}

  {{- if and .Values.services.postgres.read_replica.enabled .Values.services.postgres.read_replica.remote_url }}
  DATABASE_READ_REPLICA_URL: {{ .Values.services.postgres.read_replica.remote_url | quote }}
  {{- end }}

  {{- if .Values.services.rabbitmq.local_setup }}
  AMQP_URL: "amqp://{{ .Values.services.rabbitmq.default_user}}:{{ .Values.services.rabbitmq.default_password}}@{{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}/"
  {{- else if .Values.services.rabbitmq.external_rabbitmq_url }}
  AMQP_URL: {{ .Values.services.rabbitmq.external_rabbitmq_url}}
  {{- else }}
  AMQP_URL: ""
  {{ end }}

  {{- if include "plane.s3CAEnabled" . }}
  AWS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
  {{- end }}

  {{- if and .Values.observability.otel.enabled .Values.observability.otel.headers }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.observability.otel.headers | quote }}
  {{- end }}
{{- end }}
---

apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-app-vars
  labels:
    {{- include "plane.commonLabels" $ | nindent 4 }}
data:
  PRIME_HOST: {{ .Values.license.licenseServer | quote }}
  MACHINE_SIGNATURE: {{ include "hashString" . | quote }}
  APP_DOMAIN: {{ .Values.license.licenseDomain | quote }}
  APP_VERSION: {{ .Values.planeVersion | quote }}
  PAYMENT_SERVER_BASE_URL: "http://{{ .Release.Name }}-monitor.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}:8080/"
  FEATURE_FLAG_SERVER_BASE_URL: "http://{{ .Release.Name }}-monitor.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}:8080/"

  DEFAULT_API_RATE_LIMIT: {{ .Values.env.api_key_rate_limit | default "120/minute" | quote }}
  MINIO_ENDPOINT_SSL: {{ .Values.services.minio.env.minio_endpoint_ssl | default false | ternary "1" "0" | quote }}
  USE_STORAGE_PROXY: {{ .Values.env.use_storage_proxy | default false | ternary "1" "0" | quote }}
  ALLOW_ALL_ATTACHMENT_TYPES: {{ .Values.env.allow_all_attachment_types | default false | ternary "1" "0" | quote }}
  ENABLE_DRF_SPECTACULAR: {{ .Values.env.enable_drf_spectacular | default false | ternary "1" "0" | quote }}
  ENABLE_READ_REPLICA: {{ .Values.services.postgres.read_replica.enabled | default false | ternary "1" "0" | quote }}
  INTAKE_EMAIL_DOMAIN: {{ .Values.env.email_service_envs.smtp_domain | default "" | quote }}

  SENTRY_DSN: {{ .Values.env.sentry_dsn | default "" | quote}}
  SENTRY_ENVIRONMENT: {{ .Values.env.sentry_environment | default "" | quote}}
  DEBUG: "0"
  DOCKERIZED: "1"
  GUNICORN_WORKERS: "1"
  {{- if .Values.env.web_url}}
  WEB_URL: {{ .Values.env.web_url | default "" | quote }}
  {{- else if or .Values.ssl.tls_secret_name (and .Values.ssl.createIssuer .Values.ssl.generateCerts) }}
  WEB_URL: "https://{{ .Values.license.licenseDomain }}"
  {{- else }}
  WEB_URL: "http://{{ .Values.license.licenseDomain }}"
  {{- end }}

  LIVE_BASE_URL: "http://{{ .Release.Name }}-live.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}:3000/"
  LIVE_BASE_PATH: "/live"
  {{- if or .Values.ssl.tls_secret_name (and .Values.ssl.createIssuer .Values.ssl.generateCerts) }}
  PI_BASE_URL: "https://{{ .Values.license.licenseDomain }}"
  {{- else }}
  PI_BASE_URL: "http://{{ .Values.license.licenseDomain }}"
  {{- end }}
  PI_BASE_PATH: "/pi"

  {{- if .Values.services.runner.enabled }}
  RUNNER_BASE_URL: "http://{{ .Release.Name }}-runner.{{ .Release.Namespace }}.svc.{{ .Values.env.default_cluster_domain | default "cluster.local" }}:3000"
  {{- end }}

  {{- if .Values.airgapped.enabled }}
  IS_AIRGAPPED: "1"
  {{- end }}

  {{- if eq .Values.env.cors_allowed_origins "*"}}
  CORS_ALLOWED_ORIGINS: "*"
  {{- else if .Values.env.cors_allowed_origins }}
  CORS_ALLOWED_ORIGINS: "http://{{ .Values.license.licenseDomain }},https://{{ .Values.license.licenseDomain }},{{ .Values.env.cors_allowed_origins }}"
  {{- else}}
  CORS_ALLOWED_ORIGINS: "http://{{ .Values.license.licenseDomain }},https://{{ .Values.license.licenseDomain }}"
  {{- end }}

  {{- /* OpenTelemetry APM for the Django backend (api, worker, beat-worker,
         automation-consumer, outbox-poller, migrator). No-op in the app unless
         OTEL_ENABLED=1 and an endpoint is set. Auth headers, if any, live in the
         app-secrets Secret above. See docs/otel-api-observability in plane-ee. */}}
  {{- if .Values.observability.otel.enabled }}
  OTEL_ENABLED: "1"
  OTEL_SERVICE_NAME: {{ .Values.observability.otel.serviceName | default "plane-api" | quote }}
  {{- if .Values.observability.otel.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otel.endpoint | quote }}
  {{- else if .Values.observability.otel.collector.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ .Release.Name }}-otel-collector.{{ .Release.Namespace }}.svc.cluster.local:4317"
  {{- else }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  {{- end }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.observability.otel.protocol | default "grpc" | quote }}
  OTEL_TRACES_SAMPLER: {{ .Values.observability.otel.tracesSampler | default "parentbased_traceidratio" | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.observability.otel.tracesSamplerArg | default "0.1" | quote }}
  {{- if .Values.observability.otel.resourceAttributes }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.observability.otel.resourceAttributes | quote }}
  {{- end }}
  {{- if .Values.observability.otel.debugConsole }}
  OTEL_DEBUG_CONSOLE: "1"
  {{- end }}
  {{- /* Browser/client tracing. Read ONLY by the API, which serves it to the
         web/admin/space browsers via its public instance config — a no-op env on
         every other workload, so it lives here on the API's app-vars alone. */}}
  {{- if .Values.observability.otel.frontend.enabled }}
  FRONTEND_OTEL_ENABLED: "1"
  FRONTEND_OTLP_ENDPOINT: {{ .Values.observability.otel.frontend.endpoint | default .Values.observability.otel.endpoint | quote }}
  {{- if .Values.observability.otel.frontend.headers }}
  FRONTEND_OTLP_HEADERS: {{ .Values.observability.otel.frontend.headers | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
