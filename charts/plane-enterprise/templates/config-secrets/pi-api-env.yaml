{{- if and .Values.services.pi.enabled (empty .Values.external_secrets.pi_api_env_existingSecret)}}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-pi-api-secrets
stringData:
  {{- if .Values.services.postgres.local_setup }}
  PLANE_PI_DATABASE_URL: "postgresql://{{ .Values.env.pgdb_username }}:{{ .Values.env.pgdb_password }}@{{ .Release.Name }}-pgdb.{{ .Release.Namespace }}.svc.cluster.local/{{ .Values.env.pg_pi_db_name }}"
  {{- else if .Values.env.pg_pi_db_remote_url }}
  PLANE_PI_DATABASE_URL: {{ .Values.env.pg_pi_db_remote_url}}
  {{- else }}
  PLANE_PI_DATABASE_URL: ""
  {{- end }}

  {{- if .Values.services.postgres.local_setup }}
  FOLLOWER_POSTGRES_URI: "postgresql://{{ .Values.env.pgdb_username }}:{{ .Values.env.pgdb_password }}@{{ .Release.Name }}-pgdb.{{ .Release.Namespace }}.svc.cluster.local/{{ .Values.env.pgdb_name }}"
  {{- else if .Values.env.pgdb_remote_url }}
  FOLLOWER_POSTGRES_URI: {{ .Values.env.pgdb_remote_url | quote }}
  {{- else }}
  FOLLOWER_POSTGRES_URI: ""
  {{- end }}

  {{- if .Values.services.rabbitmq.local_setup }}
  AMQP_URL: "amqp://{{ .Values.services.rabbitmq.default_user }}:{{ .Values.services.rabbitmq.default_password }}@{{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local/"
  {{- else if .Values.services.rabbitmq.external_rabbitmq_url }}
  AMQP_URL: {{ .Values.services.rabbitmq.external_rabbitmq_url | default "" | quote }}
  {{- else }}
  AMQP_URL: ""
  {{- end }}

  {{- if .Values.services.pi.ai_providers.openai.enabled }}
  OPENAI_API_KEY: {{ .Values.services.pi.ai_providers.openai.api_key | default "" |  quote }}
  {{- end }}
  {{- if .Values.services.pi.ai_providers.claude.enabled }}
  CLAUDE_API_KEY: {{ .Values.services.pi.ai_providers.claude.api_key | default "" |  quote }}
  {{- end }}
  {{- if .Values.services.pi.ai_providers.groq.enabled }}
  GROQ_API_KEY: {{ .Values.services.pi.ai_providers.groq.api_key | default "" |  quote }}
  {{- end }}
  

  {{- if .Values.services.pi.ai_providers.cohere.enabled }}
  COHERE_API_KEY: {{ .Values.services.pi.ai_providers.cohere.api_key | default "" | quote }}
  {{- else }}
  COHERE_API_KEY: ""
  {{- end }}

  {{- if .Values.services.pi.ai_providers.custom_llm.enabled }}
  CUSTOM_LLM_API_KEY: {{ .Values.services.pi.ai_providers.custom_llm.api_key | default "" | quote }}
  {{- else }}
  CUSTOM_LLM_API_KEY: ""
  {{- end }}

  {{- if .Values.services.pi.ai_providers.embedding_model.enabled }}
  BR_AWS_SECRET_ACCESS_KEY: {{ .Values.services.pi.ai_providers.embedding_model.aws_secret_access_key | default "" | quote }}
  BR_AWS_SESSION_TOKEN: {{ .Values.services.pi.ai_providers.embedding_model.aws_session_token | default "" | quote }}
  {{- end }}

  AES_SECRET_KEY: {{ .Values.env.silo_envs.aes_secret_key | default "dsOdt7YrvxsTIFJ37pOaEVvLxN8KGBCr" | quote }}
{{- end }}
---

{{- if .Values.services.pi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-pi-api-vars
data:
  DEBUG: {{ if .Values.env.pi_envs.debug | default false }} "1" {{- else -}} "0" {{ end }}
  FASTAPI_APP_HOST: "0.0.0.0"
  FASTAPI_APP_WORKERS: "1"
  {{- if or .Values.ssl.tls_secret_name (and .Values.ssl.createIssuer .Values.ssl.generateCerts) }}
  PLANE_FRONTEND_URL: "https://{{ .Values.license.licenseDomain }}"
  {{- else }}
  PLANE_FRONTEND_URL: "http://{{ .Values.license.licenseDomain }}"
  {{- end }}

  {{- if .Values.env.pi_envs.plane_api_host }}
  PLANE_API_HOST: {{ .Values.env.pi_envs.plane_api_host | quote }}
  {{- else if or .Values.ssl.tls_secret_name (and .Values.ssl.createIssuer .Values.ssl.generateCerts) }}
  PLANE_API_HOST: "https://{{ .Values.license.licenseDomain }}"
  {{- else }}
  PLANE_API_HOST: "http://{{ .Values.license.licenseDomain }}"
  {{- end }}

  PI_INTERNAL_SECRET: {{ .Values.env.pi_envs.internal_secret | default "tyfvfqvBJAgpm9bzvf3r4urJer0Ehfdubk" | quote }}

  FEATURE_FLAG_SERVER_BASE_URL: "http://{{ .Release.Name }}-monitor.{{ .Release.Namespace }}.svc.cluster.local:8080"
  PI_BASE_PATH: "/pi"

  {{- if .Values.env.pi_envs.cors_allowed_origins }}
  CORS_ALLOWED_ORIGINS: {{ .Values.env.pi_envs.cors_allowed_origins | quote }}
  {{- else }}
  CORS_ALLOWED_ORIGINS: ["http://{{ .Values.license.licenseDomain }}", "https://{{ .Values.license.licenseDomain }}"]
  {{- end }}
  
  {{- if or .Values.ssl.tls_secret_name (and .Values.ssl.createIssuer .Values.ssl.generateCerts) }}
  PLANE_OAUTH_REDIRECT_URI: "https://{{ .Values.license.licenseDomain }}/pi/api/v1/oauth/callback/"
  {{- else }}
  PLANE_OAUTH_REDIRECT_URI: "http://{{ .Values.license.licenseDomain }}/pi/api/v1/oauth/callback/"
  {{- end }}
  PLANE_OAUTH_STATE_EXPIRY_SECONDS: {{ .Values.env.pi_envs.plane_oauth.state_expiry_seconds | default 82800 | quote }}

  OPENAI_BASE_URL: {{ .Values.services.pi.ai_providers.openai.base_url | default "" | quote }}
  CLAUDE_BASE_URL: {{ .Values.services.pi.ai_providers.claude.base_url | default "" | quote }}
  COHERE_BASE_URL: {{ .Values.services.pi.ai_providers.cohere.base_url | default "" | quote }}
  GROQ_BASE_URL: {{ .Values.services.pi.ai_providers.groq.base_url | default "" | quote }}
  
  {{- if .Values.services.pi.ai_providers.custom_llm.enabled }}
  CUSTOM_LLM_ENABLED: "true"
  CUSTOM_LLM_MODEL_KEY: {{ .Values.services.pi.ai_providers.custom_llm.model_key | default "gpt-oss-120b" | quote }}
  CUSTOM_LLM_BASE_URL: {{ .Values.services.pi.ai_providers.custom_llm.base_url | default "" | quote }}
  CUSTOM_LLM_NAME: {{ .Values.services.pi.ai_providers.custom_llm.name | default "GPT-OSS-120B" | quote }}
  CUSTOM_LLM_MAX_TOKENS: {{ .Values.services.pi.ai_providers.custom_llm.max_tokens | default 128000 | quote }}
  CUSTOM_LLM_PROVIDER: {{ .Values.services.pi.ai_providers.custom_llm.provider | default "" | quote }}
  CUSTOM_LLM_AWS_REGION: {{ .Values.services.pi.ai_providers.custom_llm.aws_region | default "" | quote }}
  {{- else }}
  CUSTOM_LLM_ENABLED: "false"
  CUSTOM_LLM_MODEL_KEY: ""
  CUSTOM_LLM_BASE_URL: ""
  CUSTOM_LLM_NAME: ""
  CUSTOM_LLM_MAX_TOKENS: ""
  CUSTOM_LLM_PROVIDER: ""
  CUSTOM_LLM_AWS_REGION: ""
  {{- end }}

  {{- if .Values.services.pi.ai_providers.embedding_model.enabled }}
  EMBEDDING_MODEL: {{ .Values.services.pi.ai_providers.embedding_model.name | default "" | quote }}
  OPENSEARCH_ML_MODEL_ID: {{ .Values.services.pi.ai_providers.embedding_model.model_id | default "" |  quote }}
  BR_AWS_ACCESS_KEY_ID: {{ .Values.services.pi.ai_providers.embedding_model.aws_access_key | default "" | quote }}
  BR_AWS_REGION: {{ .Values.services.pi.ai_providers.embedding_model.aws_region | default "us-east-1" | quote }}
  {{- end }}

  CELERY_VECTOR_SYNC_ENABLED: {{ .Values.env.pi_envs.celery.vector_sync_enabled | ternary "1" "0" | quote }}
  CELERY_VECTOR_SYNC_INTERVAL: {{ .Values.env.pi_envs.celery.vector_sync_interval | default 3 | quote }}
  CELERY_WORKSPACE_PLAN_SYNC_ENABLED: {{ .Values.env.pi_envs.celery.workspace_plan_sync_enabled | ternary "1" "0" | quote }}
  CELERY_WORKSPACE_PLAN_SYNC_INTERVAL: {{ .Values.env.pi_envs.celery.workspace_plan_sync_interval | default 86400 | quote }}
  CELERY_DOCS_SYNC_ENABLED: {{ .Values.env.pi_envs.celery.docs_sync_enabled | ternary "1" "0" | quote }}
  CELERY_DOCS_SYNC_INTERVAL: {{ .Values.env.pi_envs.celery.docs_sync_interval | default 86400 | quote }}

---
{{- end }}