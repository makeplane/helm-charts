{{- $annotations := dict -}}
{{- with .Values.serviceAccount.annotations -}}
{{- $annotations = merge $annotations . -}}
{{- end -}}
{{- with .Values.irsa.annotations -}}
{{- $annotations = merge $annotations . -}}
{{- end -}}
{{- if .Values.irsa.roleArn -}}
{{- $annotations = merge $annotations (dict "eks.amazonaws.com/role-arn" .Values.irsa.roleArn) -}}
{{- end -}}
{{- if and .Values.podIdentity.enabled .Values.podIdentity.roleArn -}}
{{- /* Pod Identity role ARN should override any IRSA role-arn when both are set. */ -}}
{{- $annotations = merge $annotations (dict "eks.amazonaws.com/role-arn" .Values.podIdentity.roleArn) -}}
{{- end -}}
{{- if .Values.podIdentity.annotations -}}
{{- $annotations = merge $annotations .Values.podIdentity.annotations -}}
{{- end -}}

apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-srv-account
{{- if gt (len $annotations) 0 }}
  annotations:
{{ toYaml $annotations | nindent 4 }}
{{- end }}
{{- if .Values.dockerRegistry.enabled }}
imagePullSecrets:
{{- if .Values.dockerRegistry.existingSecret }}
  - name: {{ .Values.dockerRegistry.existingSecret }}
{{- else }}
  - name: {{ .Release.Name }}-docker-registry-credentials
{{- end }}
{{- end }}