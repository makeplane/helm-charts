{{- if and .Values.ingress.enabled (eq (include "plane.ingressController" .) "traefik") }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-body-limit
  namespace: {{ .Release.Namespace }}
spec:
  buffering:
    maxRequestBodyBytes: {{ .Values.ingress.traefik.maxRequestBodyBytes | default 20971520 }}

{{- end }}
