{{- if and .Values.ingress.enabled (hasPrefix "traefik" .Values.ingress.ingressClass) .Values.ingress.appHost }}

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure

  routes:

  # IMPORTANT: specific paths FIRST

  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/spaces`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-space
        port: 3000

  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/god-mode`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-admin
        port: 3000

  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/api`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-api
        port: 8000

  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/auth`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-api
        port: 8000

  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/live`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-live
        port: 3000

  {{- if and .Values.minio.local_setup .Values.env.docstore_bucket }}
  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/{{ .Values.env.docstore_bucket }}`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-minio
        port: 9000
  {{- end }}

  # LAST: catch all
  - match: Host(`{{ .Values.ingress.appHost }}`) && PathPrefix(`/`)
    kind: Rule
    middlewares:
      - name: {{ .Release.Name }}-body-limit
    services:
      - name: {{ .Release.Name }}-web
        port: 3000

  tls:
    secretName: {{ default (printf "%s-ssl-cert" .Release.Name) .Values.ssl.tls_secret_name }}

{{- end }}

{{- if and .Values.ingress.enabled (hasPrefix "traefik" .Values.ingress.ingressClass) .Values.minio.local_setup .Values.ingress.minioHost }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-minio-ingress
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.minioHost }}`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-body-limit
      services:
        - name: {{ .Release.Name }}-minio
          port: 9090
  tls:
    secretName: {{ default (printf "%s-ssl-cert" .Release.Name) .Values.ssl.tls_secret_name }}
{{- end }}

{{- if and .Values.ingress.enabled (hasPrefix "traefik" .Values.ingress.ingressClass) .Values.rabbitmq.local_setup .Values.ingress.rabbitmqHost }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-rabbitmq-ingress
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.rabbitmqHost }}`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-body-limit
      services:
        - name: {{ .Release.Name }}-rabbitmq
          port: 15672
  tls:
    secretName: {{ default (printf "%s-ssl-cert" .Release.Name) .Values.ssl.tls_secret_name }}
{{- end }}
